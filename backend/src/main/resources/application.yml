spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/fitness_db?sslmode=disable}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 28

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: ${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  swagger:
    public: false
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-in-env-to-a-32-byte-minimum-secret-key}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

groq:
  api:
    key: ${GROQ_API_KEY:}
    url: https://api.groq.com/openai/v1/chat/completions
    model: ${GROQ_MODEL:llama-3.1-8b-instant}
