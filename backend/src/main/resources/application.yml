spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitness_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: ${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  swagger:
    public: false
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

groq:
  api:
    key: ${GROQ_API_KEY:}
    url: https://api.groq.com/openai/v1/chat/completions
    model: ${GROQ_MODEL:llama-3.1-8b-instant}
