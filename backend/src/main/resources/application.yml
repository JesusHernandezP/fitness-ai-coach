spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fitness_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: ${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  swagger:
    public: false
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-in-env-to-a-32-byte-minimum-secret-key}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
