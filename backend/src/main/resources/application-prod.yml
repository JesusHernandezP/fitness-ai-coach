springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'
  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 5
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO

app:
  swagger:
    public: false
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  security:
    jwt:
      secret: ${JWT_SECRET}

groq:
  api:
    key: ${GROQ_API_KEY}
