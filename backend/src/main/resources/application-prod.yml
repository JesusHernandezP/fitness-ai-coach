springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    connect-retries: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  swagger:
    public: false
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  security:
    jwt:
      secret: ${JWT_SECRET}

groq:
  api:
    key: ${GROQ_API_KEY}
