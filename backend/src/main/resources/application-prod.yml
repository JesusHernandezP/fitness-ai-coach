springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: validate

app:
  swagger:
    public: false
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
