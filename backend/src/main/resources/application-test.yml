spring:
  datasource:
    url: jdbc:h2:mem:fitness_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  security:
    jwt:
      secret: test-secret-key-for-ci-and-local-tests-32b
      expiration-ms: 86400000
