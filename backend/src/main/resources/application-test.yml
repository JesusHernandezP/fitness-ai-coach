spring:
  datasource:
    url: jdbc:h2:mem:fitness_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  security:
    jwt:
      secret: test-secret-key-for-ci-and-local-tests-32b
      expiration-ms: 86400000

groq:
  api:
    key: test-groq-key
    url: https://api.groq.com/openai/v1/chat/completions
    model: llama3-70b-8192
