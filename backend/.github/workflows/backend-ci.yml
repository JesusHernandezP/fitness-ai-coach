name: Backend CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    # Por defecto, todos los "run" se ejecutan dentro de /backend
    defaults:
      run:
        working-directory: backend

    steps:
      # 1) Descargar el código del repo en el robot
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Instalar Java 17 en el robot
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3) Cache de dependencias Maven (para que las siguientes builds sean más rápidas)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4) Compilar y ejecutar tests
      - name: Build and test with Maven
        run: mvn -B clean verify

      # 5) Guardar el JAR como "caja" descargable
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar