name: backend-cion:  push:    branches:      - main      - develop  pull_request:    branches:      - main      - developpermissions:  contents: readjobs:  build-and-test:    name: Build and Test Backend    runs-on: ubuntu-latest    defaults:      run:        working-directory: backend    steps:      - name: Checkout repository        uses: actions/checkout@v4      - name: Set up Java 17 with Maven cache        uses: actions/setup-java@v4        with:          distribution: temurin          java-version: "17"          cache: maven          cache-dependency-path: backend/pom.xml      - name: Grant execute permission to Maven wrapper        run: chmod +x mvnw      - name: Build and verify backend with Maven        run: ./mvnw -B clean verify      - name: Upload test reports        if: always()        uses: actions/upload-artifact@v4        with:          name: backend-test-reports          path: |            backend/target/surefire-reports/**            backend/target/failsafe-reports/**            backend/target/site/**          if-no-files-found: ignore      - name: Upload backend diagnostics on failure        if: failure()        uses: actions/upload-artifact@v4        with:          name: backend-build-diagnostics          path: backend/target/**          if-no-files-found: ignore